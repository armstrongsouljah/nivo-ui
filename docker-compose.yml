services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars are inlined into the JS bundle at build time, so
      # this must be reachable from the *browser*, not just this container
      # (e.g. http://localhost:8082/api/v1/ if you're running nivo-api's own
      # docker-compose stack alongside this one).
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      CLOUDINARY_URL: ${CLOUDINARY_URL}
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
